<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/hu-ica11.css">
    <title>Christmas Trivia</title>
</head>
<body>
    <div class="app">
        <header><b>Random Christmas Trivia!!</b></header>
        <section class="text">
          <div class="trivia-text" id="js-trivia-text"></div>
          <div class="answer-text" id="js-answer-text"></div>
        </section>
        <section class="controls" >
          <button type="button" id="js-new-trivia" class="new-trivia button">
            Generate a random piece of Christmas trivia!
          </button>
          <button type="button" id="js-answer" class="answer button">
            Show me the answer!
          </button>
      </div>
      <script src="/js/hu-ica11.js"></script>
</body>
</html>
