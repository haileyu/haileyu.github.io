<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/hu-wa11.css">
    <title>quote generator</title>
</head>
<body>
    <div class="app">
        <header><b>generate a random quote!</b></header>
        <section class="text">
            <div class="quote-text" id="js-quote-text"></div>
            <div class="quote-author" id="js-quote-author"></div>
        </section>
        <section class="controls" >
            <button type="button" id="js-new-quote" class="new-quote button">
                i want to see a random quote!
            </button>
            <button type="button" id="js-tweet-button" class="tweet-button">
                i want to tweet this quote!
            </button>
    </div>
    <script src="/js/hu-wa11.js"></script>
</body>
</html>
